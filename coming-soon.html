<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Found Footage</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #050505;
    color: #cc0000;
    font-family: 'Share Tech Mono', monospace;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    cursor: none;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 3px,
      rgba(0,0,0,0.2) 3px,
      rgba(0,0,0,0.2) 4px
    );
    pointer-events: none;
    z-index: 99;
  }

  .noise {
    position: fixed;
    inset: 0;
    opacity: 0.035;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3CfeColorMatrix type='saturate' values='0'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    z-index: 1;
    pointer-events: none;
  }

  .vignette {
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 30%, #050505 100%);
    z-index: 2;
    pointer-events: none;
  }

  .rec {
    position: fixed;
    top: 20px;
    left: 20px;
    display: flex;
    align-items: center;
    gap: 8px;
    z-index: 10;
  }

  .rec-dot {
    width: 7px;
    height: 7px;
    background: #cc0000;
    border-radius: 50%;
    animation: blink 1.2s ease-in-out infinite;
  }

  .rec-label {
    font-family: 'VT323', monospace;
    font-size: 18px;
    color: #cc0000;
    letter-spacing: 0.1em;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.1; }
  }

  .timestamp {
    position: fixed;
    top: 20px;
    right: 20px;
    font-family: 'VT323', monospace;
    font-size: 20px;
    color: #cc0000;
    letter-spacing: 0.05em;
    z-index: 10;
  }

  .center {
    position: relative;
    z-index: 5;
    text-align: center;
  }

  .found {
    font-family: 'VT323', monospace;
    font-size: clamp(11px, 1.5vw, 14px);
    letter-spacing: 0.5em;
    color: rgba(204,0,0,0.35);
    text-transform: uppercase;
    margin-bottom: 28px;
  }

  .coming-soon {
    font-family: 'VT323', monospace;
    font-size: clamp(64px, 14vw, 120px);
    color: #cc0000;
    letter-spacing: 0.08em;
    line-height: 1;
    animation: glitch 6s infinite;
  }

  @keyframes glitch {
    0%, 92%, 100% { 
      transform: none; 
      text-shadow: none;
      opacity: 1;
    }
    93% { 
      transform: skewX(-3deg) translateX(-4px); 
      text-shadow: 3px 0 rgba(255,255,255,0.1);
      opacity: 0.9;
    }
    94% { 
      transform: skewX(2deg) translateX(3px); 
      text-shadow: -3px 0 rgba(204,0,0,0.4);
      opacity: 1;
    }
    95% {
      transform: none;
      opacity: 0.3;
    }
    96% {
      transform: skewX(-1deg);
      opacity: 1;
    }
  }

  .signal {
    margin-top: 32px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.35em;
    color: rgba(204,0,0,0.2);
    text-transform: uppercase;
    animation: flicker 8s infinite;
  }

  @keyframes flicker {
    0%, 89%, 91%, 100% { opacity: 0.4; }
    90% { opacity: 0.05; }
  }

  .coords {
    position: fixed;
    bottom: 20px;
    left: 20px;
    font-family: 'VT323', monospace;
    font-size: 13px;
    color: rgba(204,0,0,0.25);
    letter-spacing: 0.15em;
    z-index: 10;
    line-height: 1.6;
  }

  .tape {
    position: fixed;
    bottom: 20px;
    right: 20px;
    font-family: 'VT323', monospace;
    font-size: 13px;
    color: rgba(204,0,0,0.2);
    letter-spacing: 0.15em;
    z-index: 10;
    text-align: right;
    line-height: 1.6;
  }

  .tracking {
    position: fixed;
    top: 38%;
    left: 0;
    right: 0;
    height: 1px;
    background: linear-gradient(to right, transparent, rgba(204,0,0,0.04), transparent);
    z-index: 3;
    pointer-events: none;
  }
</style>
</head>
<body>

<div class="noise"></div>
<div class="vignette"></div>
<div class="tracking"></div>

<div class="rec">
  <div class="rec-dot"></div>
  <div class="rec-label">REC</div>
</div>

<div class="timestamp" id="ts">00:00:00</div>

<div class="center">
  <p class="found">Found Footage</p>
  <div class="coming-soon">COMING<br>SOON</div>
  <p class="signal">Signal detected — stand by</p>
</div>

<div class="coords">
  LAT 30.2672°N<br>
  LON 97.7431°W
</div>

<div class="tape">
  SP HI-FI<br>
  T-120
</div>

<script>
  function tick() {
    const now = new Date();
    const h = String(now.getHours()).padStart(2,'0');
    const m = String(now.getMinutes()).padStart(2,'0');
    const s = String(now.getSeconds()).padStart(2,'0');
    document.getElementById('ts').textContent = h+':'+m+':'+s;
  }
  tick();
  setInterval(tick, 1000);
</script>

</body>
</html>
